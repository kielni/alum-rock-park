<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Alum Rock Park volunteer work areas</title>
    <script src="config.js"></script>
    <script src="map.js"></script>
    <meta
      name="viewport"
      content="initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <script src="https://cdn.maptiler.com/maptiler-sdk-js/v3.10.2/maptiler-sdk.umd.min.js"></script>
    <script src="https://cdn.maptiler.com/maptiler-marker-layout/v2.0.1/maptiler-marker-layout.umd.min.js"></script>
    <link
      href="https://cdn.maptiler.com/maptiler-sdk-js/v3.10.2/maptiler-sdk.css"
      rel="stylesheet"
    />
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <div id="map"></div>
    <div id="markers"></div>
    <script>
      maptilersdk.config.apiKey = MAP_TILER_API_KEY;

      const appContainer = document.getElementById("map");
      const map = new maptilersdk.Map({
        container: appContainer,
        style: maptilersdk.MapStyle.HYBRID,
        center: [-121.8091, 37.399], // starting position [lng, lat]
        zoom: 16, // starting zoom
      });

      // marker setup
      let markerManager = null;
      let markerStatus = null;
      const markerContainer = document.createElement("div");
      appContainer.appendChild(markerContainer);
      // This object contains the marker DIV so that they can be updated
      // rather than fully recreated every time
      const markerLogicContainer = {};

      map.on("load", async function () {
        // Load the GeoJSON data
        const response = await fetch(HOST + "ARP_areas.geojson");
        const geojsonData = await response.json();
        const sheetData = await loadSheetData();
        const data = mergeData(geojsonData, sheetData);

        drawAreas(map, data);

        const markerLayerId = createPoints(map, data);
      });
    </script>
  </body>
</html>
